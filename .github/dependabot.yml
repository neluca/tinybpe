# Dependabot configuration
# https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python dependencies
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
    # Group all dev dependency updates in a single PR
    groups:
      dev-deps:
        patterns:
          - "pytest*"
          - "ruff"
          - "mypy*"
          - "types-*"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
