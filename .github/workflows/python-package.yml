name: build

on:
  push:
    branches: [ main ]
    paths:
      - "src/**"
      - "tinybpe/**"
      - "tests/**"
      - "setup.py"
      - "pyproject.toml"
      - "requirements_dev.txt"
      - "MANIFEST.in"
      - ".github/workflows/python-package.yml"
  pull_request:
    paths:
      - "src/**"
      - "tinybpe/**"
      - "tests/**"
      - "setup.py"
      - "pyproject.toml"
      - "requirements_dev.txt"
      - "MANIFEST.in"
      - ".github/workflows/python-package.yml"
  schedule:
    - cron: '0 10 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        python-version: [ '3.9', '3.10', '3.11', '3.12', '3.13' ]
        os: [ ubuntu-latest, macos-latest, windows-latest ]
        exclude:
          - python-version: '3.9'
            os: macos-latest
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_dev.txt
      - name: Build and install
        run: |
          pip install -e .
      - name: Test with pytest
        run: |
          python -m pytest --cov=tinybpe --cov-branch --cov-report=xml --cov-fail-under=90
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: neluca/tinybpe

  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist
        run: python -m build --sdist
      - name: Install from sdist
        run: |
          pip install dist/*.tar.gz
      - name: Verify import and model loading
        run: |
          cd /tmp
          python -c "import tinybpe; print(tinybpe.__version__); print(tinybpe.list_models()); from tinybpe import Tokenizer; tok = Tokenizer.from_pretrained('cl100k_base'); print(len(tok.encode('hello world')))"
